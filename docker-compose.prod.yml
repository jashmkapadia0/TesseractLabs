# Production Deployment Configuration
version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: 3dlab-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - 3dlab-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=3dlab

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: 3dlab-python-service-prod
    restart: always
    expose:
      - "5001"
    volumes:
      - python_uploads:/app/uploads
    networks:
      - 3dlab-network
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5001
      - FILAMENT_DENSITY=1.24

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 3dlab-backend-prod
    restart: always
    expose:
      - "5000"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - 3dlab-network
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/3dlab?authSource=admin
      - PYTHON_SERVICE_URL=http://python-service:5001
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_SECRET=${RAZORPAY_SECRET}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER}
      - COST_PER_GRAM=${COST_PER_GRAM:-0.5}
      - HOURLY_RATE=${HOURLY_RATE:-100}
    depends_on:
      - mongodb
      - python-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
        - VITE_WHATSAPP_NUMBER=${WHATSAPP_NUMBER}
    container_name: 3dlab-frontend-prod
    restart: always
    expose:
      - "80"
    networks:
      - 3dlab-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: 3dlab-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - 3dlab-network
    depends_on:
      - frontend
      - backend

networks:
  3dlab-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  python_uploads:
  backend_uploads:
